version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: gasolinaiq_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo_data:/data/db

  spark:
    image: bitnami/spark:3.5
    container_name: gasolinaiq_spark
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./pipeline:/pipeline
      - ./data:/data

  api:
    build: ./api
    container_name: gasolinaiq_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
    depends_on:
      - mongodb

volumes:
  mongo_data: